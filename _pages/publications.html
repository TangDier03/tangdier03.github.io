---
title: "Publications"
permalink: /publications/
layout: single
---

<style>
  .pub-title {
    font-size: 1rem;
    margin-bottom: 0.3rem;
  }
  .pub-meta {
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 0.5rem;
  }
  .pub-item {
    margin-bottom: 2rem;
  }
</style>

{% for publication in site.publications reversed %}
  <div class="pub-item">
    <div class="pub-title">
      <a href="{{ publication.url | relative_url }}">{{ publication.title }}</a>
    </div>
    <div class="pub-meta">
      {{ publication.author }}, {{ publication.venue }}, {{ publication.date | date: "%Y" }}
    </div>
  </div>
{% endfor %}
